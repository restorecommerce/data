  id: LoRaWAN-Concentrator-Card-mini-PCIe
  active: true
  product:
    name: Concentrator Card LRWCCx-MPCIE for LoRaWAN® technology
    categoryId: af78d419a3ea4156992620b921914b3e
    description: >-
      The LRWCCx-MPCI is a family of LoRaWAN® concentrator cards in mini PCIe
      form factor

      based on Semtechs SX1301 or SX1308 chipset.

      An LRWCC card enables OEMs and system integrators to build
      high-performance, certified LoRaWAN® gateway solutions.

      Moreover it allows to retrofit existing routers and other edge-level
      network equipment

      with LoRaWAN® gateway capabilities.


      The card can be used in any embedded platform offering a free mini-PCIe
      slot with

      USB connectivity and capable of providing enough power for the card.

      Typically the host system runs a reasonably recent Linux operating system.

      Apart from support for the USB controller and a networking stack (TCP/IP
      and UDP), no further

      Kernel drivers are required.

      The software driver to run the card in this kind of setup is the

      [HAL driver](https://github.com/Lora-net/picoGW_hal)

      which runs in the user space.

      Additionally [packet
      forwarder](https://github.com/Lora-net/picoGW_packet_forwarder)

      is required to forward data onto a LoRa® network server.

      Both are available via the

      [LoRa® network](https://github.com/Lora-net).

      project as Open Source Software.

      In addition there is an MCU firmware that enables a UART interface for
      host communication.


      LoRa® and LoRaWAN® are registered trademark of Semtech Corporation.
