  id: BG77_LTE_Cat_M1-and-LTE_Cat_NB2_M2_Card
  active: true
  product:
    name: LTE Cat M1 and LTE Cat NB2 (NB-IoT) Card
    categoryId: a2d689e72e074c9f902fb60c968add4a
    description: >
      The LTEC card is an LTE Cat M1, NB2 card with integrated GNSS adopting the
      standard M.2 2230
          E-Key based on the [Quectel BG77 module](https://www.quectel.com/product/bg77.htm). For a IoT, M2M applications such as wireless PoS, tracking, smart metering, etc.

      ## Highlights


      - Data Rate LTE Cat M1:
        - Max. 588 kbps (DL)
        - 1119 kbps (UL)
      - Data Rate LTE Cat NB2:
        - Max. 127 kbps (DL)
        - 158.5 kbps (UL)
      - Data Rate LTE Cat NB1:
        - Max. 32 kbps (DL)
        - 70 kbps (DL)
      - Global use and broad carrier approval

      - GNSS based on GPS/GLONASS/BeiDou/Galileo/QZSS

      - Low profile and compact


      ## Specification


      For more details see the specification of the [Quectel BG77
      module](https://www.quectel.com/product/bg77.htm).
