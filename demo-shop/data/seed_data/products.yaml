  id: arm-jtag-20-tc2030-vtarget-programmer-adapter
  active: true
  product:
    name: ARM/ JTAG/ J-Link 20-Pin to TC2030 6-Pin Programmer Adapter
    categoryId: cf8468831d604580b7beb9765e74fe88
    description: >-
      The 20-Pin ARM/ JTAG header to the [Tag Connect
      TC2030](http://www.tag-connect.com/TC2030-IDC-NL) adapter provides Vtarget
      coming from the 5 V Supply Pin 19 as specified

      [in the TC2030 docs](http://www.tag-connect.com/Materials/TC2030-CTX.pdf)

      to the target whereby the voltage level is adjustable. The target voltage
      level is also fed into Vref (Pin 1) in order to make the programmer select
      the correct voltage level for the target.

      As such it is a mixture of the [J-Link Target Supply
      Adapter](https://www.segger.com/products/debug-probes/j-link/accessories/adapters/target-supply-adapter/)

      and the [J-Link 6-Pin Needle
      Adapter](https://www.segger.com/products/debug-probes/j-link/accessories/adapters/6-pin-needle-adapter/)
      with the difference that Vref is provided by the adapter.

      The adapter is particularly useful for battery powered devices because it
      allows programming/ debugging and measurement of the target current to
      calculate the power consumption at the same time.


      ## Highlights


      - 20-Pin ARM/ JTAG/ J-Link to 6-Pin TC2330 adapter

      - Low noise LDO based target power supply with a maximum current of 800 mA

      - Adjustable supply voltage 3.3 / 1.8 / 1.0 V

      - Reset button to reset target

      - Current measurement via circuit breaker


      ## TC2030 Pinout


      - 1 VCC Target

      - 2 SWDIO/ TMS

      - 3 nRESET

      - 4 SWCLK/ TCK

      - 5 GND (also connected to GNDDetect)

      - 6 SWO/ TDO


      # Target Voltages


      - 3.3 V / 400 mA max.

      - 1.8 V / 200 mA max.

      - 1.0 V / 150 mA max.


      ## Specifications


