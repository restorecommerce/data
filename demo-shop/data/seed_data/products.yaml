      ## Usage


      1. Disconnect any power source from the Raspberry Pi and leave it
      disconnected when using the hat

      2. Insert the standoff spacers and snap on the hat

      3. Connect a 802.3af compliant PoE injector (usually an ethernet switch)
      to the RPi ethernet jack

      4. to read the temperature from the temperature sensor, [follow this
      guide](https://wiki.52pi.com/index.php?title=Raspberry_Pi_LM75B_temperature_Sensor_v1.0_SKU:EP-0031).
