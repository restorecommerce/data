      - Overload protection

      - 7 W power delivery

      - Mini PCIe slot with SPI/ UART signals routed to RPi header

      - Power good LED

      - High efficiency enabled by Schottky diode bridge rectifier

      - Non-standard SPI connectivity between mPCIe header and RPi SP0 bus

      - Optional USB on mini PCIe slot through JST connector to wire

      - No [power issues like the original PoE hat
      had](http://linuxgizmos.com/refund-offered-for-raspberry-pi-poe-hat-due-to-power-issues/)


      ## Application


      The device can be used to reliably power the Raspberry Pi through PoE.

      The temperature can be monitored and an mPCIe card can be plugged in.

      The optional GNSS module is connected to the I2C bus of the RPi.

      Combining this with an [LRWCCx-MPCIE
      card](/devices/LoRaWAN-Concentrator-Card-mini-PCIe.html) and a proper
      enclosure turns

      the solution into an LoRaWAN® gateway.


      ## Wiring Up USB


      USB is not available on the RPi's 40 pin header, if you need USB on the
      mPCIe port,

      the following modification is required:


      1. Remove solder bridges R8, R9.

      2. Solder the wires of a JST 1.25 mm pigtail as follows to the test pads
      on the backside of the:
        2.1 Raspberry Pi 3B: 46 to D- on the JST connector and test pad 47 to D+ on the JST connector.
        2.2 Raspberry Pi 4B: 18 to D- on the JST connector and test pad 19 to D+ on the JST connector.
      3. Connect the JST connector to the connector designated with 'USB' on the
      backside.


      **WARNING**: This will void the warranty of the RPi and you risk fatal
      damage to the devices.


