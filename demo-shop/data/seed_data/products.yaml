  id: tinyCurrent-precision-low-Current-Measurement-Shunt-and-Amplifier-Device
  active: true
  product:
    name: tinyCurrent low Current Measurement Shunt and Amplifier
    categoryId: f39c078d402d43e6b58e4700c23ef93b
    description: >-
      A low cost yet professional low current measurement shunt and amplifier

      combination to overcome the issue of high burden voltage as seen with

      multimeters and to enable low current measurement by using voltage
      measurement

      devices such as oscilloscopes.


      Originally designed and sold by

      [Dave Jones on the EEVBLOG](https://www.eevblog.com/projects/ucurrent/),

      this derivative has several enhancements specifically for measuring
      varying

      currents on today's low power devices.

      Switch mode voltage regulators and the varying current draw of MCUs and RF

      chips require the determination of the current draw over time to calculate
      the

      total power consumption of a device. A storage oscilloscope is a perfect
      tool

      for this task and widely available.

      That's why the tinyCurrent features a **BNC connector to reduce the
      picked-up

      noise** while measuring with an and oscilloscope. Another problem is the
      high

      dynamics in power draw caused by the aforementioned reasons.

      This is addressed by the possibility to

      **power the device from an external source**

      with up to 5.5 V and the possibility to tweak the device for a higher

      maximum output voltage. Both measures combined lead to

      **almost 3 times higher dynamic range**.


      ## Modifications to the original Design


      ### Highlights


      - Added BNC output for even lower noise when acquiring with high sampling
      rate, high input impedance instruments like an oscilloscope. The effect is
      lower noise compared to normal banana leads.

      See all <a
      href="https://github.com/nfhw/tinycurrent/tree/master/Scope_Shots">scope
      shots</a> for comparison.

      - Added a 2-pin 1.25 mm JST ZH style male header for powering the device
      externally to better use the device in permanent measurement setups.
      **Only use without battery**.

      - Allow device to be fed with supply voltage of up to 5.5 V to increase
      the dynamic range (only when external power source us used).

      - Added header J6 which allows to install a THT resistor or bond wire to
      change the ratio of the voltage divider R6/ R7 to increase the dynamic
      range for positive currents. R6/ R7 have a ratio of 1/ 5 to allow for a
      max. positive output voltage of ~80% of the supply voltage.

      - "R-Variant" with reversed BNC connector optimized for attaching the
      device directly to an oscilloscope's input via a [BNC-to-BNC
      adapter](https://www.telegaertner.com/en/product/coax/bnc/bnc-adaptor/bnc-adaptor-m-m-100023590).


      ### Other Differences


      - Increased width of some traces

      - Case and board shape to fit case

      - Removed test traces on PCB on all 4 corners as they are antennas

      - Banana plug sockets are _not_ gold plated → Testing shows that there is
      no measurable difference in conductivity

      - Slide switches with lower current rating than in original design → Tests
      have shown that the used switch can easily handle 5V/ 6A which should be
      far enough for this device

      - Shunt resistor R9 has 0.05% greater tolerance → Parts are hand selected
      using 7 1/2 Digit DMM with 4 wire measurement in 100 Ohm range

      - Pads for C5, C6 to fit caps on the virtual ground rails to prevent
      oscillation with capacitive loads

      - Some other BoM changes without negative implications


