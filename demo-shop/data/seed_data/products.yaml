  id: stx-lr-familiy-of-lorawan-iot-sensors
  active: true
  product:
    name: LoRaWAN® IoT Action Button and Sensors in a very compact Form Factor
    categoryId: fa083e0d689647a5953f9816af979cc1
    description: >
      The sensors have dual wireless interface supporting NFC and LoRaWAN for
      868 MHz and 915 MHz regulatory domains.

      The line up consists the models:


      - sta-lr: Action Button with tactile feedback,

      - stx-lr: Environment Sensor (temperature, humidity), motion
      (acceleration), magnetic field (via reed switch), ambient light,

      - ste-lr: Environment Sensor (temperature, humidity, air pressure, air
      quality VOCs).


      The combination of the following features makes these products unique:


      - Very small physical dimensions

      - Appealing industrial design

      - IP54 rated enclosure

      - Residue-free adhesive tape based mounting

      - Dual wireless interface with LoRaWAN and NFC for configuration and
      commissioning

      - Ultra low power optimized to enable long battery life of 10+ years is
      possible

      - Open source firmware

      - Possibility to re-program the device (programmer adapter available)

      - Environmentally friendly through easily replaceable battery

      - RF Output power of up to 15 dBm

      - Firmware upgrade and device configuration via NFC

      - Android OS based Mobile app for management

      - With custom Firmware: freely programmable NFC tag providing NDEF records
      to mobile devices

      - Optional secure element for secure key storage


      ### “Action”


      Is an IoT button based on a tactile switch which can is used to detect the
      following three gestures:


      - single press

      - double press

      - long presses


      ### “Multisensor”


      Is capable of sensing the following measurements:


      - Environment
        - Temperature
        - Humidity
      - Motion (acceleration)

      - Magnetic field sensitive Reed switch (normally open)

      - Ambient light


      Triggers can be configured for the following sensor readings based on
      thresholds:


      - Environment
        - Temperature (upper or lower bound)
        - Air pressure (upper or lower bound)
      - Motion (acceleration)

      - Ambient light (upper and lower bound)


      This allows the device to only send data when a defined threshold is
      exceeded.


      ### “Environment”


      Is capable of sensing the following measurements:


      - Temperature

      - Humidity

      - Air pressure

      - Air quality VOCs


