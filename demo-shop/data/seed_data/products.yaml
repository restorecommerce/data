      ## Usage


      1. Install the [SEGGER J-Link
      software](https://www.segger.com/downloads/jlink/) onto your machine.

      2. Start J-Link Commander, which can be found under “Start → Programs →
      SEGGER → J-Link”.

      3. Enter the following command: `power on perm`.

      4. Plug in the adapter to the J-Link: The Power LED D1 on the adapter
      should be on.

      5. Select the target voltage using slide switch S2.

      6. Plug in the target and start working.
