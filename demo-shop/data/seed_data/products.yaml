      ## Maximum Ratings


      - Maximum supply voltage: 5.5 V

      - Maximum current through input ports: 5 A


      In order to keep the burden voltage low, this device has no

      **OVERLOAD PROTECTION**. That means **NO FUSES**. Care is required in

      using the unit to prevent damage.


      ## Schematics and PCB Design


      All source files are [available on
      Github](https://github.com/nfhw/tinycurrent).

      The schematics and PCB layout are in Altium Designer format.


      ## Kit Contents


      - tinyCurrent PCB and case plus 4 screws

      - **no** battery, you need a CR2032 coin cell battery


      ## Usage


      1. If you supply power via J5, make sure the noise level is lower than the
      expected output voltage.

      **Too much noise on the supply voltage will render any measurement
      useless. Usually primary cells (batteries) are the best choice for this**.

      2. Connect the device under test in loop **on the low side** so that the
      current flow is from **+** to **-**.

      3. Connect a suitable voltage measurement device such as a DMM or an
      Oscilloscope on the output side.

      4. Turn on the device and read the current on the voltage measurement
      device in the mV range as if it were mA/µA/nA.


      ## Where to buy?


      Pick it up ready to use from the [n-fuse
      website](https://www.n-fuse.co/devices/tinyCurrent-precision-low-Current-Measurement-Shunt-and-Amplifier-Device.html).


      ## Licenses


      ### Circuit Schematics


      The circuit schematics of this project are made available under the

      [CC-BY-SA](https://creativecommons.org/licenses/by-sa/3.0/) license.


      ### Hardware Design


      <img
      src="https://i2.wp.com/www.oshwa.org/wp-content/uploads/2014/03/oshw-logo-100-px.png?resize=95%2C100">
      Open source hardware.


      ### Miscellenious


      Data sheets, Altium libraries, 3D Models are subject to vendor specific

      licensing.
