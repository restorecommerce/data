name: test

on: push

jobs:
  test:
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup NodeJS
        uses: actions/setup-node@v1
        with:
          node-version: '12.18'

      - name: Setup System
        uses: restorecommerce/setup-system-action@v1
        with:
          backing-only: false

      - name: Restart Facade to make sure API key is propogated
        run: docker restart restorecommerce_facade_srv && sleep 10

      - name: Install Dependencies
        run: npm ci
        working-directory: demo-shop

      - name: Read API key
        run: |
          API_KEY=$(docker logs restorecommerce_facade_srv 2> /dev/null | grep -Eo "Bootstrap API Key is: [0-9a-z]+" | tail -n1 | awk '{print $5}')
          echo "API_KEY=$API_KEY" >> $GITHUB_ENV

      - name: Import master data
        run: node import.js import -t $API_KEY -j master
        working-directory: demo-shop

      - name: Import identity data
        run: node import.js import -t $API_KEY -j identity
        working-directory: demo-shop

      - name: Import extra data
        run: node import.js import -t $API_KEY -j extra
        working-directory: demo-shop

      - name: Import catalog data
        run: node import.js import -t $API_KEY -j catalog
        working-directory: demo-shop
